name: Ultimate AI Update Manager (Astro + TG)

on:
  push:
    paths:
      - 'ai-updates/**.zip'

jobs:
  unzip-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Process Update or Rollback
        id: process_step
        env:
          ENV_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          export TZ="Europe/Bratislava"
          CURRENT_TIME=$(date +"%H:%M:%S")
          
          FINAL_LOG="tg_final_report.txt"
          echo "📦 **Репозиторий:** \`$ENV_REPO_NAME\`" > $FINAL_LOG
          echo "⏱️ **Время:** *$CURRENT_TIME*" >> $FINAL_LOG
          
          ZIP_FILE=$(ls ai-updates/*.zip | head -n 1)
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Архив не найден."
            exit 0
          fi
          
          ZIP_NAME=$(basename "$ZIP_FILE")
          
          # =========================================================================
          # СЦЕНАРИЙ 3: БЫЛ ЗАПУЩЕН ОТКАТ ИЗМЕНЕНИЙ (backup-rollback.zip)
          # =========================================================================
          if [ "$ZIP_NAME" = "backup-rollback.zip" ]; then
            echo "⚡ **Что делали:** Откат по бэкапу" >> $FINAL_LOG
            echo "" >> $FINAL_LOG
            
            mkdir ./temp_rollback
            unzip -o "$ZIP_FILE" -d ./temp_rollback
            
            if [ -f "./temp_rollback/delete.txt" ]; then
              echo "🗑️ **Удалены файлы:**" >> $FINAL_LOG
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                  echo "\`$clean_path\`" >> $FINAL_LOG
                fi
              done < ./temp_rollback/delete.txt
              echo "" >> $FINAL_LOG
            fi
            
            rm -rf ./temp_rollback "$ZIP_FILE"
            echo "IS_ROLLBACK=true" >> $GITHUB_ENV
            
          # =========================================================================
          # СЦЕНАРИИ 1 и 2: ОБЫЧНОЕ ОБНОВЛЕНИЕ
          # =========================================================================
          else
            echo "⚡ **Что делали:** Обновление проекта и проверка фото" >> $FINAL_LOG
            echo "" >> $FINAL_LOG
            
            # Твой оригинальный рабочий способ получения списка имен файлов
            unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -E "\.(jpg|jpeg)$" | tr -d '\r' > unzip_list.txt || true
            
            mkdir ./temp_unzip
            unzip -o "$ZIP_FILE" -d ./temp_unzip
            
            # Удаление файлов по запросу ИИ
            if [ -f "./temp_unzip/delete.txt" ]; then
              echo "🗑️ **Удалены файлы:**" >> $FINAL_LOG
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                  echo "\`$clean_path\`" >> $FINAL_LOG
                fi
              done < ./temp_unzip/delete.txt
              rm ./temp_unzip/delete.txt
              echo "" >> $FINAL_LOG
            fi
            
            # Накатываем новые файлы
            if [ "$(ls -A ./temp_unzip 2>/dev/null)" ]; then
              cp -rf ./temp_unzip/* ./
            fi
            rm -rf ./temp_unzip
            
            # Создаем бэкап-противоядие
            ALL_ARCHIVE_FILES=$(unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -v -E "(^$|^\.|.*/$)" | tr -d '\r' || true)
            BACKUP_DIR="./ai-updates/backups"
            mkdir -p "$BACKUP_DIR"
            rm -rf ./temp_backup && mkdir ./temp_backup
            
            echo "$ALL_ARCHIVE_FILES" | while read -r f; do
              f_clean=$(echo "$f" | xargs)
              if [ -n "$f_clean" ] && [ "$f_clean" != "delete.txt" ] && [ -f "$f_clean" ]; then
                echo "$f_clean" >> ./temp_backup/delete.txt
              fi
            done
            
            BACKUP_CREATED="false"
            if [ -f "./temp_backup/delete.txt" ]; then
              cd ./temp_backup && zip -r ../backup-rollback.zip delete.txt && cd ..
              mv backup-rollback.zip "$BACKUP_DIR/backup-rollback.zip"
              BACKUP_CREATED="true"
            fi
            rm -rf ./temp_backup "$ZIP_FILE"
            
            # Ставим sharp
            npm install sharp --no-save
            
            # Твой оригинальный рабочий Node.js блок с подстановкой лога через bash
            node -e '
            const fs = require("fs");
            const sharp = require("sharp");
            
            async function processImages() {
              const logFile = "tg_final_report.txt";
              const listFile = "unzip_list.txt";
              
              fs.appendFileSync(logFile, "📸 **Проверка фото:**\n");
              
              if (!fs.existsSync(listFile)) {
                fs.appendFileSync(logFile, "Новых изображений в архиве нет.\n\n");
                return;
              }
              
              const content = fs.readFileSync(listFile, "utf8");
              const allFiles = content.split("\n")
                .map(f => f.trim())
                .filter(f => f && (f.endsWith(".jpg") || f.endsWith(".jpeg")) && fs.existsSync(f));
              
              if (allFiles.length === 0) {
                fs.appendFileSync(logFile, "Новых изображений в архиве нет.\n\n");
                if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
                return;
              }
              
              for (const file of allFiles) {
                try {
                  const stat = fs.statSync(file);
                  let origSizeKB = Math.round(stat.size / 1024);
                  let origSizeStr = origSizeKB >= 1024 ? (origSizeKB / 1024).toFixed(1) + " MB" : origSizeKB + " KB";
                  
                  const image = sharp(file);
                  const meta = await image.metadata();
                  
                  if (meta.width <= 1200) {
                    fs.appendFileSync(logFile, `\`${file}\` — ${origSizeStr} — ОК\n`);
                  } else {
                    const buffer = await image.resize({ width: 1200, withoutEnlargement: true }).jpeg({ quality: 85 }).toBuffer();
                    fs.writeFileSync(file, buffer);
                    
                    let newSizeKB = Math.round(buffer.length / 1024);
                    let newSizeStr = newSizeKB >= 1024 ? (newSizeKB / 1024).toFixed(1) + " MB" : newSizeKB + " KB";
                    
                    fs.appendFileSync(logFile, `\`${file}\` — ${origSizeStr} -> ${newSizeStr} — ОПТ\n`);
                  }
                } catch (err) {
                  fs.appendFileSync(logFile, `\`${file}\` — ошибка анализа\n`);
                }
              }
              fs.appendFileSync(logFile, "\n");
              if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
            }
            processImages();
            '
            
            if [ "$BACKUP_CREATED" = "true" ]; then
              echo "💾 **Бэкап создан.**" >> $FINAL_LOG
              echo "" >> $FINAL_LOG
            fi
            
            echo "IS_ROLLBACK=false" >> $GITHUB_ENV
          fi
          
          # Переносим накопленный лог в окружение Гитхаба
          {
            echo 'TG_REPORT_BODY<<EOF'
            cat $FINAL_LOG
            echo 'EOF'
          } >> $GITHUB_ENV
          rm -f $FINAL_LOG

      # Тестируем сборку Astro (Только для обычных обновлений)
      - name: Install dependencies & Test Astro Build
        if: success() && env.IS_ROLLBACK == 'false'
        id: astro_build
        run: |
          npm install
          npm run build

      # Формирование финального статуса при полном успехе шагов
      - name: Compile Success Report
        if: success()
        run: |
          echo "IMAGE_REPORT<<EOF" > report_env.txt
          echo "${{ env.TG_REPORT_BODY }}" >> report_env.txt
          
          if [ "${{ env.IS_ROLLBACK }}" = "false" ]; then
            echo "🟢 **Обновление успешно (Astro Build развернут)**" >> report_env.txt
          else
            echo "🟢 **Откат успешно выполнен.**" >> report_env.txt
          fi
          echo "EOF" >> report_env.txt
          cat report_env.txt >> $GITHUB_ENV
          rm report_env.txt

      # Формирование финального статуса при ошибке на каком-то этапе
      - name: Compile Failure Report
        if: failure()
        run: |
          echo "IMAGE_REPORT<<EOF" > report_env.txt
          echo "${{ env.TG_REPORT_BODY }}" >> report_env.txt
          
          if [ "${{ env.IS_ROLLBACK }}" = "false" ]; then
            echo "🔴 **Ошибка обновления (Astro Build упал)**" >> report_env.txt
          else
            echo "🔴 **Ошибка при выполнении операции отката**" >> report_env.txt
          fi
          echo "EOF" >> report_env.txt
          cat report_env.txt >> $GITHUB_ENV
          rm report_env.txt

      # Сохраняем изменения в гит (если всё прошло успешно)
      - name: Commit and Push changes
        if: success()
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Изменений нет."
          else
            if [ "${{ env.IS_ROLLBACK }}" = "true" ]; then
              git commit -m "🚨 Авто-откат: репозиторий успешно очищен от файлов"
            else
              git commit -m "🤖 Авто-обновление сайта и создание точки отката"
            fi
            git push origin ${{ github.ref_name }}
          fi

      # Единая отправка итогового сообщения в Telegram
      - name: Send Final Telegram Notification
        if: always() && env.IMAGE_REPORT != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.IMAGE_REPORT }}
