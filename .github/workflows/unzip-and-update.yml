name: Ultimate AI Update Manager (Astro + TG)

on:
  push:
    paths:
      - 'ai-updates/**.zip'

jobs:
  unzip-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Unzip, Clean and Optimize Images
        id: process_step
        run: |
          export TZ="Europe/Bratislava"
          CURRENT_TIME=$(date +"%H:%M:%S")
          
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          
          ZIP_FILE=$(ls ai-updates/*.zip | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            
            # 1. Получаем список картинок из архива
            unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -E "\.(jpg|jpeg|png)$" | tr -d '\r' > unzip_list.txt || true
            
            # 2. Распаковываем во временную папку
            mkdir ./temp_unzip
            unzip -o "$ZIP_FILE" -d ./temp_unzip
            
            # 3. Удаление файлов по списку delete.txt
            if [ -f "./temp_unzip/delete.txt" ]; then
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                fi
              done < ./temp_unzip/delete.txt
              rm ./temp_unzip/delete.txt
            fi
            
            # 4. Переносим файлы на место и чистим входящий архив
            cp -rf ./temp_unzip/* ./
            rm -rf ./temp_unzip
            rm "$ZIP_FILE"
            
            # 5. Ставим sharp
            npm install sharp --no-save
            
            # 6. Запускаем Node.js скрипт
            node -e '
            const fs = require("fs");
            const sharp = require("sharp");
            
            async function processImages() {
              const reportFile = "tg_image_report.txt";
              const listFile = "unzip_list.txt";
              
              if (!fs.existsSync(listFile)) {
                return; // Если файла списка нет, ничего не пишем (сообщение не создается)
              }
              
              const content = fs.readFileSync(listFile, "utf8");
              const allFiles = content.split("\n")
                .map(f => f.trim())
                .filter(f => f && (f.endsWith(".jpg") || f.endsWith(".jpeg") || f.endsWith(".png")) && fs.existsSync(f));
              
              if (allFiles.length === 0) {
                if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
                return; // Если картинок нет (например, это откат), выходим, не создавая пустой отчет
              }
              
              // Создаем заголовок только если картинки реально есть
              fs.writeFileSync(reportFile, `📦 **Репозиторий:** \`'${REPO_NAME}'\`\n⏱ *'${CURRENT_TIME}'*\n📸 *Инспекция фото:*\n\n`);
              
              for (const file of allFiles) {
                try {
                  const stat = fs.statSync(file);
                  let origSizeKB = Math.round(stat.size / 1024);
                  let origSizeStr = origSizeKB >= 1024 ? (origSizeKB / 1024).toFixed(1) + " MB" : origSizeKB + " KB";
                  
                  const image = sharp(file);
                  const meta = await image.metadata();
                  
                  if (meta.width <= 1200) {
                    fs.appendFileSync(reportFile, `• \`${file}\` — ${origSizeStr} — ОК\n`);
                  } else {
                    const buffer = await image.resize({ width: 1200, withoutEnlargement: true }).jpeg({ quality: 85 }).toBuffer();
                    fs.writeFileSync(file, buffer);
                    
                    let newSizeKB = Math.round(buffer.length / 1024);
                    let newSizeStr = newSizeKB >= 1024 ? (newSizeKB / 1024).toFixed(1) + " MB" : newSizeKB + " KB";
                    
                    fs.appendFileSync(reportFile, `• \`${file}\` — ${origSizeStr} -> ${newSizeStr} — ОПТ\n`);
                  }
                } catch (err) {
                  fs.appendFileSync(reportFile, `• \`${file}\` — ошибка анализа\n`);
                }
              }
              
              if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
            }
            processImages().catch(err => {
              fs.appendFileSync("tg_image_report.txt", "🔴 Ошибка скрипта обработки фото\n");
              process.exit(1);
            });
            '
            
            # Экспортируем переменную только если файл отчета был создан и он не пустой
            if [ -s tg_image_report.txt ]; then
              {
                echo 'IMAGE_REPORT<<EOF'
                cat tg_image_report.txt
                echo 'EOF'
              } >> $GITHUB_ENV
            fi
            rm -f tg_image_report.txt
            
          else
            echo "Архив не найден."
            exit 1
          fi

      # Отправка инспекции фото — ТЕПЕРЬ СТРОГО ЕСЛИ ТЕКСТ ЕСТЬ (Защита от пустых сообщений)
      - name: Send Image Inspection Report
        if: always() && env.IMAGE_REPORT != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.IMAGE_REPORT }}

      # Тестируем сборку Astro
      - name: Install dependencies & Test Astro Build
        run: |
          npm install
          npm run build

      # Коммитим изменения только при успешной сборке
      - name: Commit and Push changes
        if: success()
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Изменений нет."
          else
            git commit -m "🤖 Авто-обновление сайта (Проверка успешна)"
            git push origin ${{ github.ref_name }}
          fi

      # Получаем финальный таймштамп
      - name: Get Final Timestamp
        if: always()
        run: |
          export TZ="Europe/Bratislava"
          echo "FINAL_TIME=$(date +"%H:%M:%S")" >> $GITHUB_ENV

      # Итоговое сообщение об успехе сборки
      - name: Send Success Telegram Message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏱️ *${{ env.FINAL_TIME }}*
            🟢 **Обновление успешно (Astro Build развернут)**

      # Итоговое сообщение о падении сборки
      - name: Send Failure Telegram Message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏱️ *${{ env.FINAL_TIME }}*
            🔴 **Ошибка обновления (Astro Build упал)**
