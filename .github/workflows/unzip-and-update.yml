name: Ultimate AI Update Manager (Astro + TG)

on:
  push:
    paths:
      - 'ai-updates/**.zip'

jobs:
  unzip-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Unzip, Clean and Smart Inspect Images
        run: |
          export TZ="Europe/Bratislava"
          CURRENT_TIME=$(date +"%H:%M:%S")
          
          ZIP_FILE=$(ls ai-updates/*.zip | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            # 1. Создаем чистую временную папку и ЖЕСТКО принудительно распаковываем (-o)
            mkdir ./temp_unzip
            unzip -o "$ZIP_FILE" -d ./temp_unzip
            
            # 2. Удаление файлов по списку delete.txt
            if [ -f "./temp_unzip/delete.txt" ]; then
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                fi
              done < ./temp_unzip/delete.txt
              rm ./temp_unzip/delete.txt
            fi
            
            # 3. Готовим отчет
            REPORT_FILE="tg_image_report.txt"
            echo "⏱️ *$CURRENT_TIME*" > $REPORT_FILE
            echo "📸 *Инспекция фото:*" >> $REPORT_FILE
            HAS_IMAGES=false
            
            # 4. Сканируем файлы во временной папке
            while IFS= read -r -d '' FILE; do
              [ -e "$FILE" ] || continue
              HAS_IMAGES=true
              
              SHORT_PATH=${FILE#./temp_unzip/}
              
              ORIG_SIZE_BYTES=$(stat -c%s "$FILE")
              ORIG_SIZE_KB=$((ORIG_SIZE_BYTES / 1024))
              WIDTH=$(identify -format "%w" "$FILE" 2>/dev/null || echo "0")
              
              if [ $ORIG_SIZE_KB -ge 1024 ]; then
                ORIG_SIZE_STR="$(awk "BEGIN {printf \"%.1f\", $ORIG_SIZE_KB/1024}") MB"
              else
                ORIG_SIZE_STR="${ORIG_SIZE_KB} KB"
              fi
              
              if [ "$WIDTH" -le 1200 ] && [ "$WIDTH" -gt 0 ]; then
                echo "• \`$SHORT_PATH\` — ok" >> $REPORT_FILE
              elif [ "$WIDTH" -gt 1200 ]; then
                TMP_FILE=$(mktemp)
                convert "$FILE" -resize "1200>" -quality 85 "$TMP_FILE"
                mv "$TMP_FILE" "$FILE"
                
                NEW_SIZE_BYTES=$(stat -c%s "$FILE")
                NEW_SIZE_KB=$((NEW_SIZE_BYTES / 1024))
                
                if [ $NEW_SIZE_KB -ge 1024 ]; then
                  NEW_SIZE_STR="$(awk "BEGIN {printf \"%.1f\", $NEW_SIZE_KB/1024}") MB"
                else
                  NEW_SIZE_STR="${NEW_SIZE_KB} KB"
                fi
                
                echo "• \`$SHORT_PATH\` — $ORIG_SIZE_STR — $NEW_SIZE_STR — опт." >> $REPORT_FILE
              else
                echo "• \`$SHORT_PATH\` — ошибка чтения файла" >> $REPORT_FILE
              fi
            done < <(find ./temp_unzip -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) -print0)
            
            if [ "$HAS_IMAGES" = false ]; then
              echo "Новых изображений в архиве нет." >> $REPORT_FILE
            fi
            
            # 5. Переносим файлы в корень, затирая старые файлы без вопросов
            cp -rf ./temp_unzip/* ./
            rm -rf ./temp_unzip
            rm "$ZIP_FILE"
            
            {
              echo 'IMAGE_REPORT<<EOF'
              cat $REPORT_FILE
              echo 'EOF'
            } >> $GITHUB_ENV
            
          else
            echo "Архив не найден."
            exit 1
          fi

      - name: Send Image Inspection Report
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.IMAGE_REPORT }}

      - name: Install dependencies & Test Astro Build
        run: |
          npm install
          npm run build

      - name: Commit and Push changes
        if: success()
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Изменений нет."
          else
            git commit -m "🤖 Авто-обновление сайта (Проверка успешна)"
            git push origin ${{ github.ref_name }}
          fi

      - name: Get Final Timestamp
        if: always()
        run: |
          export TZ="Europe/Bratislava"
          echo "FINAL_TIME=$(date +"%H:%M:%S")" >> $GITHUB_ENV

      - name: Send Success Telegram Message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏱️ *${{ env.FINAL_TIME }}*
            🟢 Проект успешно обновлен

      - name: Send Failure Telegram Message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ⏱️ *${{ env.FINAL_TIME }}*
            🔴 Ошибка обновления
