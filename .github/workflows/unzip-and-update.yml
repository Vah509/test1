name: Ultimate AI Update Manager (Astro + TG)

on:
  push:
    paths:
      - 'ai-updates/**.zip'

jobs:
  unzip-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage 1 Process Files and Images
        id: stage_one
        env:
          ENV_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          export TZ="Europe/Bratislava"
          CURRENT_TIME=$(date +"%H:%M:%S")
          
          # Передаем время во внешнее окружение для второго сообщения
          echo "START_TIME=$CURRENT_TIME" >> $GITHUB_ENV
          
          ZIP_FILE=$(ls ai-updates/*.zip | head -n 1)
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Архив не найден."
            exit 0
          fi
          
          ZIP_NAME=$(basename "$ZIP_FILE")
          
          FIRST_LOG="tg_stage1_report.txt"
          echo "📦 **Репозиторий:** \`$ENV_REPO_NAME\`" > $FIRST_LOG
          echo "⏱️ **Время:** *$CURRENT_TIME*" >> $FIRST_LOG
          echo "📄 **Файл архива:** \`$ZIP_NAME\`" >> $FIRST_LOG
          echo "" >> $FIRST_LOG
          
          # =========================================================================
          # ВЕТКА ОТКАТА (backup-rollback.zip)
          # =========================================================================
          if [ "$ZIP_NAME" = "backup-rollback.zip" ]; then
            echo "⚡ **Откат по бэкапу**" >> $FIRST_LOG
            echo "" >> $FIRST_LOG
            
            mkdir ./temp_rollback
            unzip -o "$ZIP_FILE" -d ./temp_rollback
            
            if [ -f "./temp_rollback/delete.txt" ]; then
              echo "🗑️ **Удалены файлы:**" >> $FIRST_LOG
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                  echo "\`$clean_path\`" >> $FIRST_LOG
                fi
              done < ./temp_rollback/delete.txt
              echo "" >> $FIRST_LOG
            fi
            
            rm -rf ./temp_rollback "$ZIP_FILE"
            echo "IS_ROLLBACK=true" >> $GITHUB_ENV
            
          # =========================================================================
          # ВЕТКА ОБЫЧНОГО ОБНОВЛЕНИЯ
          # =========================================================================
          else
            echo "⚡ **Обновление проекта и проверка фото**" >> $FIRST_LOG
            echo "" >> $FIRST_LOG
            
            # ТВОЯ СТАРАЯ ТЕХНОЛОГИЯ: Чтение имен файлов строго ИЗ АРХИВА до распаковки
            unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -E "\.(jpg|jpeg)$" | tr -d '\r' > unzip_list.txt || true
            
            mkdir ./temp_unzip
            unzip -o "$ZIP_FILE" -d ./temp_unzip
            
            # 1. Удаление файлов, если ИИ попросил удалить
            if [ -f "./temp_unzip/delete.txt" ]; then
              echo "🗑️ **Удалены файлы:**" >> $FIRST_LOG
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                  echo "\`$clean_path\`" >> $FIRST_LOG
                fi
              done < ./temp_unzip/delete.txt
              rm ./temp_unzip/delete.txt
              echo "" >> $FIRST_LOG
            fi
            
            # 2. Составляем список обновляемых файлов (все, кроме картинок и delete.txt)
            echo "🔄 **Файлы обновлены:**" >> $FIRST_LOG
            unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -v -E "(^$|^\.|.*/$|delete\.txt|\.(jpg|jpeg)$)" | tr -d '\r' | while read -r updated_file; do
              f_clean=$(echo "$updated_file" | xargs)
              if [ -n "$f_clean" ]; then
                echo "\`$f_clean\`" >> $FIRST_LOG
              fi
            done
            echo "" >> $FIRST_LOG
            
            # Накатываем новые файлы на свои места
            if [ "$(ls -A ./temp_unzip 2>/dev/null)" ]; then
              cp -rf ./temp_unzip/* ./
            fi
            rm -rf ./temp_unzip
            
            # 3. Создаем автоматический бэкап обратного действия
            ALL_ARCHIVE_FILES=$(unzip -l "$ZIP_FILE" | awk '{print $4}' | grep -v -E "(^$|^\.|.*/$)" | tr -d '\r' || true)
            BACKUP_DIR="./ai-updates/backups"
            mkdir -p "$BACKUP_DIR"
            rm -rf ./temp_backup && mkdir ./temp_backup
            
            echo "$ALL_ARCHIVE_FILES" | while read -r f; do
              f_clean=$(echo "$f" | xargs)
              if [ -n "$f_clean" ] && [ "$f_clean" != "delete.txt" ] && [ -f "$f_clean" ]; then
                echo "$f_clean" >> ./temp_backup/delete.txt
              fi
            done
            
            BACKUP_CREATED="false"
            if [ -f "./temp_backup/delete.txt" ]; then
              cd ./temp_backup && zip -r ../backup-rollback.zip delete.txt && cd ..
              mv backup-rollback.zip "$BACKUP_DIR/backup-rollback.zip"
              BACKUP_CREATED="true"
            fi
            rm -rf ./temp_backup "$ZIP_FILE"
            
            if [ "$BACKUP_CREATED" = "true" ]; then
              echo "💾 **Бэкап создан.**" >> $FIRST_LOG
              echo "" >> $FIRST_LOG
            fi
            
            # 4. Ставим sharp и запускаем проверку картинок в самом конце
            npm install sharp --no-save
            
            # ТВОЙ СТАРЫЙ РАБОЧИЙ NODE БЛОК: Сканирует unzip_list.txt и выводит полные пути
            node -e '
            const fs = require("fs");
            const sharp = require("sharp");
            
            async function processImages() {
              const logFile = "tg_stage1_report.txt";
              const listFile = "unzip_list.txt";
              
              fs.appendFileSync(logFile, "📸 **Проверка фото:**\n");
              
              if (!fs.existsSync(listFile)) {
                fs.appendFileSync(logFile, "Новых изображений в архиве нет.\n\n");
                return;
              }
              
              const content = fs.readFileSync(listFile, "utf8");
              const allFiles = content.split("\n")
                .map(f => f.trim())
                .filter(f => f && (f.endsWith(".jpg") || f.endsWith(".jpeg")) && fs.existsSync(f));
              
              if (allFiles.length === 0) {
                fs.appendFileSync(logFile, "Новых изображений в архиве нет.\n\n");
                if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
                return;
              }
              
              for (const file of allFiles) {
                try {
                  const stat = fs.statSync(file);
                  let origSizeKB = Math.round(stat.size / 1024);
                  let origSizeStr = origSizeKB >= 1024 ? (origSizeKB / 1024).toFixed(1) + " MB" : origSizeKB + " KB";
                  
                  const image = sharp(file);
                  const meta = await image.metadata();
                  
                  if (meta.width <= 1200) {
                    fs.appendFileSync(logFile, `\`${file}\` — ${origSizeStr} — ОК\n`);
                  } else {
                    const buffer = await image.resize({ width: 1200, withoutEnlargement: true }).jpeg({ quality: 85 }).toBuffer();
                    fs.writeFileSync(file, buffer);
                    
                    let newSizeKB = Math.round(buffer.length / 1024);
                    let newSizeStr = newSizeKB >= 1024 ? (newSizeKB / 1024).toFixed(1) + " MB" : newSizeKB + " KB";
                    
                    fs.appendFileSync(logFile, `\`${file}\` — ${origSizeStr} -> ${newSizeStr} — ОПТ\n`);
                  }
                } catch (err) {
                  fs.appendFileSync(logFile, `\`${file}\` — ошибка анализа\n`);
                }
              }
              fs.appendFileSync(logFile, "\n");
              if (fs.existsSync(listFile)) fs.unlinkSync(listFile);
            }
            processImages();
            '
            
            echo "IS_ROLLBACK=false" >> $GITHUB_ENV
          fi
          
          # Экспортируем лог первого этапа в Гитхаб
          {
            echo 'STAGE1_REPORT<<EOF'
            cat $FIRST_LOG
            echo 'EOF'
          } >> $GITHUB_ENV
          rm -f $FIRST_LOG

      # СРАЗУ отправляем отчет первого этапа (удаления, обновления, бэкап, фото)
      - name: Send Stage 1 Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ env.STAGE1_REPORT }}

      # Тестируем сборку Astro (Только если это обычное обновление, а не откат)
      - name: Install dependencies and Test Astro Build
        if: success() && env.IS_ROLLBACK == 'false'
        run: |
          npm install
          npm run build

      # Второе сообщение: если всё собралось успешно
      - name: Send Success Status Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📦 **Репозиторий:** `${{ github.event.repository.name }}`
            ⏱️ **Время:** *${{ env.START_TIME }}*
            ${{ env.IS_ROLLBACK == 'false' && '🟢 **Обновление успешно (Astro Build развернут)**' || '🟢 **Откат успешно выполнен.**' }}

      # Второе сообщение: если на этапе билда или отката произошла ошибка
      - name: Send Failure Status Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📦 **Репозиторий:** `${{ github.event.repository.name }}`
            ⏱️ **Время:** *${{ env.START_TIME }}*
            ${{ env.IS_ROLLBACK == 'false' && '🔴 **Ошибка обновления (Astro Build упал)**' || '🔴 **Ошибка при выполнении операции отката**' }}

      # Сохраняем изменения в репозиторий (при успехе)
      - name: Commit and Push changes
        if: success()
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Изменений нет."
          else
            if [ "${{ env.IS_ROLLBACK }}" = "true" ]; then
              git commit -m "🚨 Авто-откат: репозиторий успешно очищен от файлов"
            else
              git commit -m "🤖 Авто-обновление сайта и создание точки отката"
            fi
            git push origin ${{ github.ref_name }}
          fi
